<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>Duck Verse Arena | Rare Ink Studios</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app">
    <section id="startScreen" class="start-screen">
      <img src="assets/duckverse-poster.jpeg" class="poster" alt="Duck Verse Arena" />

      <div class="start-card">
        <p class="studio">RARE INK STUDIOS PRESENTS</p>
        <h1>DUCK VERSE ARENA</h1>
        <p class="tagline">
          Super Duck vs Bat Duck inside the haunted Phantom Train Station.
        </p>

        <button id="startBtn" class="main-btn">Start Fight</button>

        <div class="mini-instructions">
          <p><strong>Mobile:</strong> Use the buttons at the bottom.</p>
          <p><strong>Desktop:</strong> A/D move, W jump, F punch, G special.</p>
        </div>
      </div>
    </section>

    <section id="gameScreen" class="game-screen hide">
      <div class="topbar">
        <div class="brand">DUCK VERSE ARENA</div>
        <button id="resetBtn">Restart</button>
      </div>

      <div class="hud">
        <div class="hud-card">
          <div class="name">Super Duck</div>
          <div class="health"><div id="p1Health"></div></div>
        </div>

        <div class="arena-name">PHANTOM TRAIN STATION</div>

        <div class="hud-card enemy">
          <div class="name">Bat Duck</div>
          <div class="health"><div id="p2Health"></div></div>
        </div>
      </div>

      <div class="canvas-wrap">
        <canvas id="game" width="960" height="540"></canvas>
        <div id="winner" class="winner hide"></div>
      </div>

      <div class="mobile-controls">
        <button class="control-btn" data-key="left">◀</button>
        <button class="control-btn" data-key="jump">▲</button>
        <button class="control-btn" data-key="right">▶</button>
        <button class="control-btn punch" data-key="punch">PUNCH</button>
        <button class="control-btn special" data-key="special">SPECIAL</button>
      </div>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
